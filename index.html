<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            margin-top: 80px;
        }

        h1 {
            font-size: 60px;
        }

        p {
            font-size: 24px;
        }

        .box {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .images img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 20px;
        }

        .scripture {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 14px;
            max-width: 220px;
            text-align: left;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Happy Birthday ❤️</h1>
        <p>To my favorite girl in the world.</p>
        <p>I pray 23 treats you well.</p>
        <p>God bless you and I love you forever and always!</p>

        <div class="images">
            <img src="photo1.png" alt="Photo 1">
            <img src="photo2.png" alt="Photo 2">
            <img src="photo3.jpg" alt="Photo 3">
			<img src="photo4.jpg" alt="Photo 4">
        </div>
    </div>

    <div class="scripture">
        “Cherish her, and she will exalt you;
		embrace her, and she will honor you.”<br>
        — Proverbs 4:8
    </div>

</body>
</html>

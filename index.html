<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            margin-top: 80px;
        }

        h1 {
            font-size: 60px;
        }

        p {
            font-size: 24px;
        }

        .box {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
        }

        .images {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .images img {
            width: 250px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Happy Birthday ❤️</h1>
        <p>To the most amazing person in my life.</p>
        <p>I hope your day is as special as you are.</p>
        <p>Love you always.</p>

        <div class="images">
            <img src="photo1.png" alt="Photo 1">
            <img src="photo2.png" alt="Photo 2">
            <img src="photo3.jpg" alt="Photo 3">
			<img src="photo3.jpg" alt="Photo 4">
        </div>
    </div>

</body>
</html>

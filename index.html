<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            margin-top: 100px;
        }

        h1 {
            font-size: 60px;
        }

        p {
            font-size: 24px;
        }

        .box {
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 30px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Happy Birthday ❤️</h1>
        <p>To the most amazing person in my world.</p>
        <p>I hope your day is as special as you are.</p>
        <p>Love you always.</p>
    </div>
</body>
</html>
